name: stage_a
freeze_decoder: true
lora:
  enabled: false
epochs: 2
optimizer:
  name: adamw
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
scheduler:
  name: cosine
  warmup_steps: 1000
  min_lr_ratio: 0.1
grad_accum_steps: 8
micro_batch_size: 8
mixed_precision: bf16
gradient_checkpointing: true
clip_grad_norm: 1.0
loss:
  name: ce
  infill_prob: 0.0
log_every: 50
eval_every: 1000
save_every: 5000
max_steps: null
