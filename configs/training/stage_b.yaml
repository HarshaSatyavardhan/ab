name: stage_b
freeze_decoder: true
lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  bias: none
epochs: 5
optimizer:
  name: adamw
  lr: 2.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
projector_lr_multiplier: 0.5
scheduler:
  name: cosine
  warmup_steps: 1000
  min_lr_ratio: 0.1
grad_accum_steps: 8
micro_batch_size: 8
mixed_precision: bf16
gradient_checkpointing: true
clip_grad_norm: 1.0
loss:
  name: ce_infill_mix
  infill_prob: 0.5
log_every: 50
eval_every: 1000
save_every: 5000
max_steps: null
init_from: null
